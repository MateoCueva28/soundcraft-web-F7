{% extends 'base.html' %}
{% block title %}- Login{% endblock %}

{% block content %}
<div class="form-card" style="max-width: 420px; margin: 3rem auto;">
    <h1 class="page-title"><i class="fas fa-right-to-bracket"></i> Iniciar sesión</h1>
    <form method="post" action="{% url 'login_view' %}">
        {% csrf_token %}
        <div class="form-group">
            <label>Correo</label>
            <input type="email" name="correoUsuario" required>
        </div>
        <div class="form-group">
            <label>Contraseña</label>
            <input type="password" name="contraseniaUsuario" required>
        </div>
        <div class="form-actions">
            <button type="submit" class="btn btn-primary">Ingresar</button>
        </div>
    </form>
</div>
{% endblock %}
